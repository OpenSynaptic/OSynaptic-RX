name: CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "examples/**"
      - "CMakeLists.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "examples/**"
      - "CMakeLists.txt"
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # CMake build + unit tests (Linux, strict C89) — GCC
  # -------------------------------------------------------------------------
  cmake-gcc:
    name: CMake / GCC (C89, Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build/gcc \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_C_FLAGS="-std=c89 -pedantic -Wall -Wextra -Werror \
              -Wshadow -Wconversion -Wundef -Wcast-qual" \
            -DOSRX_BUILD_TESTS=ON \
            -DOSRX_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build/gcc --parallel

      - name: Test
        run: ctest --test-dir build/gcc --output-on-failure

  # -------------------------------------------------------------------------
  # CMake build — Clang
  # -------------------------------------------------------------------------
  cmake-clang:
    name: CMake / Clang (C89, Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang
        run: sudo apt-get install -y clang

      - name: Configure
        run: |
          cmake -S . -B build/clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_C_FLAGS="-std=c89 -pedantic -Wall -Wextra -Werror" \
            -DOSRX_BUILD_TESTS=ON \
            -DOSRX_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build/clang --parallel

      - name: Test
        run: ctest --test-dir build/clang --output-on-failure

  # -------------------------------------------------------------------------
  # Custom config tiers — Parser-only / Full / Comfort
  # -------------------------------------------------------------------------
  cmake-tiers:
    name: CMake / Config tier / ${{ matrix.tier.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tier:
          - name: ParserOnly
            flags: "-DOSRX_NO_PARSER=OFF -DOSRX_VALIDATE_CRC8=1 -DOSRX_VALIDATE_CRC16=1 -DOSRX_BODY_MAX=40 -DOSRX_ID_MAX=3 -DOSRX_UNIT_MAX=4 -DOSRX_B62_MAX=7"
          - name: NoCRC16
            flags: "-DOSRX_VALIDATE_CRC16=0 -DOSRX_BODY_MAX=64"
          - name: NoParser
            flags: "-DOSRX_NO_PARSER=ON -DOSRX_BODY_MAX=64"
          - name: Comfort
            flags: "-DOSRX_BODY_MAX=96 -DOSRX_ID_MAX=12 -DOSRX_UNIT_MAX=12 -DOSRX_B62_MAX=14"

    steps:
      - uses: actions/checkout@v4

      - name: Configure (${{ matrix.tier.name }})
        run: |
          cmake -S . -B build/tier-${{ matrix.tier.name }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-std=c89 -pedantic -Wall -Wextra -Werror" \
            ${{ matrix.tier.flags }} \
            -DOSRX_BUILD_TESTS=ON \
            -DOSRX_BUILD_EXAMPLES=ON

      - name: Build (${{ matrix.tier.name }})
        run: cmake --build build/tier-${{ matrix.tier.name }} --parallel

      - name: Test (${{ matrix.tier.name }})
        run: ctest --test-dir build/tier-${{ matrix.tier.name }} --output-on-failure

  # -------------------------------------------------------------------------
  # CMake cross-compile: avr-gcc (no run, just compile check)
  # -------------------------------------------------------------------------
  cross-avr:
    name: Cross / avr-gcc (ATmega328P)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install avr-gcc
        run: sudo apt-get install -y gcc-avr avr-libc

      - name: Compile library (avr-gcc, C89)
        run: |
          avr-gcc -std=c89 -mmcu=atmega328p -Os -Wall -Wextra \
            -I include \
            -c src/osrx_crc.c    -o /tmp/osrx_crc.o
          avr-gcc -std=c89 -mmcu=atmega328p -Os -Wall -Wextra \
            -I include \
            -c src/osrx_b62.c    -o /tmp/osrx_b62.o
          avr-gcc -std=c89 -mmcu=atmega328p -Os -Wall -Wextra \
            -I include \
            -c src/osrx_packet.c -o /tmp/osrx_packet.o
          avr-gcc -std=c89 -mmcu=atmega328p -Os -Wall -Wextra \
            -I include \
            -c src/osrx_sensor.c -o /tmp/osrx_sensor.o
          avr-gcc -std=c89 -mmcu=atmega328p -Os -Wall -Wextra \
            -I include \
            -c src/osrx_parser.c -o /tmp/osrx_parser.o

      - name: Compile basic_rx example (avr-gcc)
        run: |
          avr-gcc -std=c89 -mmcu=atmega328p -Os -Wall -Wextra \
            -I include \
            src/osrx_crc.c src/osrx_b62.c \
            src/osrx_packet.c src/osrx_sensor.c src/osrx_parser.c \
            examples/basic_rx.c \
            -o /tmp/basic_rx.elf

  # -------------------------------------------------------------------------
  # Arduino CLI lint (library.properties + sketch syntax)
  # -------------------------------------------------------------------------
  arduino-lint:
    name: Arduino Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: arduino/arduino-lint-action@v1
        with:
          library-manager: false
          compliance: strict
